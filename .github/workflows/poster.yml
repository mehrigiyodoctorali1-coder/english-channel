name: English free course poster

on:
  schedule:
    # UTC! Toshkent (UTC+5) 09,12,15,18 -> UTC 04,07,10,13
    - cron: '7 4 * * *'
    - cron: '7 7 * * *'
    - cron: '7 10 * * *'
    - cron: '7 13 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Repozitoriyni olish
        uses: actions/checkout@v4

      - name: Python ornatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kutubxonalar (Pillow + emoji shrift)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-color-emoji
          pip install pillow

      - name: Post yuborish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          POSTS_PER_RUN: "1"
        run: python telegram_poster.py

      - name: Holatni saqlash (posted_log.json)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posted_log.json
          git commit -m "update posted_log [skip ci]" || echo "ozgarish yoq"
          git pull --rebase --autostash || true
          git push || echo "push otmadi"
