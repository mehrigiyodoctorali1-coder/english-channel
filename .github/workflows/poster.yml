name: English free course poster

on:
  schedule:
    # Vaqtlar UTC da! Toshkent (UTC+5). B2 kursi: kuniga 4 post, har 3 soatda.
    # Toshkent 09:00,12:00,15:00,18:00 -> UTC 04:00,07:00,10:00,13:00
    # :07 daqiqa - soat boshidagi yuklamadan qochish uchun (ishonchliroq)
    - cron: '7 4 * * *'
    - cron: '7 7 * * *'
    - cron: '7 10 * * *'
    - cron: '7 13 * * *'
  workflow_dispatch: {}   # qo'lda "Run workflow" tugmasi uchun

permissions:
  contents: write   # posted_log.json ni qaytarib saqlash uchun

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Repozitoriyni olish
        uses: actions/checkout@v4

      - name: Python o'rnatish
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Kutubxonalar (Pillow + emoji shrift)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-color-emoji
          pip install pillow

      - name: Post yuborish
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          POSTS_PER_RUN: "1"   # har run 1 post -> kuniga 4 post (09,12,15,18)
        run: python telegram_poster.py

      - name: Holatni saqlash (posted_log.json)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add posted_log.json
          git commit -m "update posted_log 